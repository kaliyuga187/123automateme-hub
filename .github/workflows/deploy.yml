name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: npm i -g pnpm@10
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm typecheck
      - run: pnpm build

  deploy:
    needs: check
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT || 22 }}
          script: |
            cd ${{ secrets.VPS_DEPLOY_PATH }}
            git pull origin main
            docker build -t k187-hub:latest .
            docker stop k187-hub 2>/dev/null || true
            docker rm k187-hub 2>/dev/null || true
            docker compose up -d hub 2>/dev/null || docker run -d \
              --name k187-hub \
              --restart unless-stopped \
              --network nexus \
              -p 3738:3738 \
              k187-hub:latest
            echo "Deployed $(git rev-parse --short HEAD) at $(date)"
