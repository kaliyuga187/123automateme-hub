# 123automateme.com — public landing page
# Added 2026-06-13 by Hermes. Routes traffic to the k187-hub Next.js container.

# ── HTTP → HTTPS + certbot challenge ──────────────────────────────
server {
    listen 80;
    server_name 123automateme.com www.123automateme.com;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
        try_files $uri =404;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ── HTTPS → k187-hub:3738 ────────────────────────────────────────
server {
    listen 443 ssl http2;
    server_name 123automateme.com www.123automateme.com;

    include /etc/nginx/conf.d/ssl-params.conf;
    ssl_certificate     /etc/letsencrypt/live/123automateme.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/123automateme.com/privkey.pem;

    # Security headers (in addition to ssl-params.conf).
    add_header X-Frame-Options          "SAMEORIGIN" always;
    add_header X-Content-Type-Options   "nosniff" always;
    add_header Referrer-Policy          "strict-origin-when-cross-origin" always;

    # Long cache for hashed static assets.
    location ~* \.(?:js|css|woff2?|svg|png|jpe?g|gif|ico|webp)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    location / {
        proxy_pass http://k187-hub:3738;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        $connection_upgrade;
        proxy_read_timeout 60s;
    }
}
